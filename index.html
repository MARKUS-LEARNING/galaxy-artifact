<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPATIAL CSV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    color: #111;
  }
  canvas { display: block; }

  #hud {
    position: fixed; top: 20px; left: 20px; z-index: 10;
    pointer-events: none;
  }
  #hud h1 {
    font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
    color: #bbb; margin-bottom: 2px;
  }
  #hud .sub { font-size: 8px; letter-spacing: 2px; color: #ccc; }

  #info {
    position: fixed; bottom: 20px; left: 20px; z-index: 10;
    font-size: 8px; letter-spacing: 2px; color: #bbb;
    line-height: 1.8; pointer-events: none;
  }

  #nav-hint {
    position: fixed; bottom: 20px; right: 20px; z-index: 10;
    font-size: 8px; letter-spacing: 2px; color: #ccc;
    text-align: right; pointer-events: none; line-height: 2;
  }

  #tooltip {
    position: fixed; z-index: 20;
    background: rgba(255,255,255,0.96);
    backdrop-filter: blur(12px);
    border: 1px solid #eee;
    padding: 10px 14px;
    font-size: 9px; letter-spacing: 1px; line-height: 1.7;
    color: #333; pointer-events: none; display: none;
    max-width: 300px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.05);
  }
  #tooltip .t-name { font-weight: 700; font-size: 10px; letter-spacing: 2px; }
  #tooltip .t-artist { color: #666; }
  #tooltip .t-album { color: #999; font-style: italic; }
  #tooltip .t-meta { margin-top: 4px; }
  #tooltip .t-genre {
    display: inline-block; padding: 1px 6px; border-radius: 2px;
    font-size: 7px; letter-spacing: 2px; text-transform: uppercase;
  }

  #drop-zone {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100; text-align: center;
  }
  #drop-zone.hidden { display: none; }
  #drop-zone .title {
    font-size: 9px; letter-spacing: 6px; text-transform: uppercase;
    color: #bbb; margin-bottom: 16px;
  }
  #drop-zone .area {
    width: 320px; height: 140px;
    border: 1px dashed #ddd;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; cursor: pointer; transition: all 0.3s;
  }
  #drop-zone .area:hover { border-color: #999; }
  #drop-zone .area p { font-size: 8px; letter-spacing: 3px; color: #aaa; margin: 4px; }
  #drop-zone input { display: none; }
  #drop-zone .btn {
    margin-top: 12px; font-family: inherit;
    font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
    background: none; border: 1px solid #ddd; color: #aaa;
    padding: 6px 16px; cursor: pointer; transition: all 0.3s;
  }
  #drop-zone .btn:hover { border-color: #999; color: #666; }
  body.dragging #drop-zone .area { border-color: #999; background: rgba(0,0,0,0.01); }
</style>
</head>
<body>

<div id="hud">
  <h1>Spatial CSV</h1>
  <div class="sub" id="hud-sub"></div>
</div>

<div id="info"></div>
<div id="nav-hint"></div>
<div id="tooltip">
  <div class="t-name"></div>
  <div class="t-artist"></div>
  <div class="t-album"></div>
  <div class="t-meta"></div>
</div>

<div id="drop-zone">
  <div class="title" id="drop-title">/// Load CSV ///</div>
  <div class="area" id="drop-area">
    <p>Drop file here</p>
    <p style="color:#ddd">or click to browse</p>
    <input type="file" id="file-input" accept=".csv,.tsv,.txt,text/*">
  </div>
  <button class="btn" id="load-sample">Load Sample Music Data</button>
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─── Palettes ───
const COLORS = [
  '#FF006E','#8338EC','#3A86FF','#06D6A0','#FB5607',
  '#FFBE0B','#FF69B4','#00F5D4','#9B5DE5','#F15BB5',
  '#FEE440','#00BBF9','#FF4CC3','#72EFDD','#C77DFF',
  '#F72585','#4CC9F0','#7209B7','#560BAD','#480CA8',
  '#E63946','#2EC4B6','#E9C46A','#264653','#F4A261',
  '#A8DADC','#457B9D','#1D3557','#D62828','#FCBF49'
];

const GEOMS = [
  () => new THREE.IcosahedronGeometry(1, 0),
  () => new THREE.OctahedronGeometry(1, 0),
  () => new THREE.TetrahedronGeometry(1, 0),
  () => new THREE.DodecahedronGeometry(1, 0),
  () => new THREE.TorusGeometry(0.6, 0.25, 8, 12),
  () => new THREE.TorusKnotGeometry(0.5, 0.2, 48, 8, 2, 3),
  () => new THREE.BoxGeometry(1.1, 1.1, 1.1),
  () => new THREE.ConeGeometry(0.7, 1.4, 6),
  () => new THREE.SphereGeometry(0.8, 8, 6),
  () => new THREE.CylinderGeometry(0.3, 0.7, 1.2, 8),
];

// ─── State ───
let scene, camera, renderer, composer, controls, clock;
let meshes = [], dataPoints = [], labelSprites = [];
let colorMap = {}, headers = [], csvData = [];
let raycaster = null, mouse = new THREE.Vector2(-9, -9);
let hoveredMesh = null;
let totalRows = 0;
let mappings = {};
const SPREAD = 80; // spatial spread
const MAX_PTS = 2000;
const MAX_LABELS = 20;
// Keyboard fly speed
const flyVel = new THREE.Vector3();

// ─── CSV Parser (RFC 4180) ───
function csvSplitRows(text) {
  const rows = []; let cur = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { inQ = !inQ; cur += c; }
    else if (c === '\n' && !inQ) { rows.push(cur); cur = ''; }
    else cur += c;
  }
  if (cur.trim()) rows.push(cur);
  return rows;
}

function csvSplitFields(line) {
  const f = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) { f.push(cur); cur = ''; }
    else cur += c;
  }
  f.push(cur);
  return f;
}

function parseCSV(text) {
  const norm = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const rawRows = csvSplitRows(norm);
  if (rawRows.length < 2) return { headers: [], rows: [] };

  const isTSV = rawRows[0].includes('\t');
  const parse = isTSV
    ? l => l.split('\t').map(v => v.trim().replace(/^"|"$/g, ''))
    : csvSplitFields;

  const hdrs = parse(rawRows[0]);
  const rows = [];
  for (let i = 1; i < rawRows.length; i++) {
    if (!rawRows[i].trim()) continue;
    const vals = parse(rawRows[i]);
    if (vals.length >= hdrs.length - 5 && vals.length <= hdrs.length + 2) {
      const row = {};
      hdrs.forEach((h, j) => row[h] = (vals[j] || '').trim());
      rows.push(row);
    }
  }
  return { headers: hdrs, rows };
}

function sampleRows(rows) {
  if (rows.length <= MAX_PTS) return rows;
  const step = rows.length / MAX_PTS, out = [];
  for (let i = 0; i < rows.length && out.length < MAX_PTS; i += step)
    out.push(rows[Math.floor(i)]);
  return out;
}

// ─── Column analysis ───
function isNum(v) { return v !== '' && !isNaN(parseFloat(v)) && isFinite(v); }

function analyzeCol(col, rows) {
  const vals = rows.map(r => r[col]).filter(v => v !== '' && v != null);
  const numVals = vals.filter(isNum);
  const filledRatio = vals.length / rows.length;
  return {
    numeric: numVals.length > vals.length * 0.6,
    filled: filledRatio,
    unique: new Set(vals).size,
    vals
  };
}

// ─── Smart Auto-mapping for Music Data ───
function autoMap(hdrs, rows) {
  const info = {};
  hdrs.forEach(h => info[h] = analyzeCol(h, rows));

  const find = (keywords) => hdrs.find(h =>
    keywords.some(k => h.toLowerCase() === k) // exact match first
  ) || hdrs.find(h =>
    keywords.some(k => h.toLowerCase().includes(k))
  );

  // Music-specific: prefer Year (not Time which is duration in ms)
  let xCol = find(['year']);
  // Genre on Y spreads categorically
  let yCol = find(['genre']);
  // Artist on Z
  let zCol = find(['artist']);
  // Color by genre
  let colorCol = find(['genre', 'type', 'category', 'style']);
  // If no music-specific columns found, fall back to general logic
  if (!xCol) {
    // Find numeric columns with good fill rate, skip size/bitrate/sample rate
    const skip = ['size', 'bit rate', 'sample rate', 'disc number', 'disc count',
                  'track number', 'track count', 'movement number', 'movement count',
                  'volume adjustment', 'plays', 'skips'];
    const goodNum = hdrs.filter(h =>
      info[h].numeric && info[h].filled > 0.3 &&
      !skip.some(s => h.toLowerCase().includes(s))
    );
    xCol = goodNum[0] || hdrs.find(h => info[h].numeric);
  }
  if (!yCol) {
    const goodCat = hdrs.filter(h =>
      !info[h].numeric && info[h].filled > 0.3 &&
      info[h].unique > 1 && info[h].unique < rows.length * 0.5
    );
    yCol = goodCat[0] || hdrs[1];
  }
  if (!zCol) {
    const cat2 = hdrs.filter(h =>
      !info[h].numeric && h !== yCol && info[h].filled > 0.3 &&
      info[h].unique > 1
    );
    zCol = cat2[0] || hdrs[2];
  }
  if (!colorCol) colorCol = yCol;

  return { x: xCol || hdrs[0], y: yCol || hdrs[1], z: zCol || hdrs[2], color: colorCol };
}

// ─── Scene ───
function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xffffff);
  scene.fog = new THREE.FogExp2(0xffffff, 0.0025);

  camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.5, 2000);
  camera.position.set(0, 40, 120);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;
  document.body.appendChild(renderer.domElement);

  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  composer.addPass(new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight), 0.5, 0.3, 0.9
  ));

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.minDistance = 5;
  controls.maxDistance = 600;

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const d1 = new THREE.DirectionalLight(0xffffff, 0.7);
  d1.position.set(60, 80, 60);
  scene.add(d1);
  const d2 = new THREE.DirectionalLight(0x8888ff, 0.25);
  d2.position.set(-40, -20, -40);
  scene.add(d2);

  // Subtle grid
  const grid = new THREE.GridHelper(200, 30, 0xeeeeee, 0xf5f5f5);
  grid.position.y = -SPREAD / 2 - 5;
  scene.add(grid);

  raycaster = new THREE.Raycaster();
  clock = new THREE.Clock();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  });
  renderer.domElement.addEventListener('mousemove', onMouse);
  window.addEventListener('keydown', onKey);
  window.addEventListener('keyup', onKeyUp);
}

// ─── Position mapping ───
function safeMin(a) { let m = Infinity; for (let i = 0; i < a.length; i++) if (a[i] < m) m = a[i]; return m; }
function safeMax(a) { let m = -Infinity; for (let i = 0; i < a.length; i++) if (a[i] > m) m = a[i]; return m; }

// Pre-compute position caches per column
let posCache = {};

function computePosCache(col, rows) {
  const info = analyzeCol(col, rows);
  if (info.numeric) {
    const nums = rows.map(r => parseFloat(r[col])).filter(v => !isNaN(v));
    const min = safeMin(nums), max = safeMax(nums), range = max - min || 1;
    posCache[col] = { type: 'num', min, range };
  } else {
    const uniques = [...new Set(rows.map(r => r[col]))];
    const map = {};
    uniques.forEach((v, i) => map[v] = ((i / (uniques.length - 1 || 1)) - 0.5) * SPREAD);
    posCache[col] = { type: 'cat', map };
  }
}

function getPos(row, col) {
  const c = posCache[col];
  if (!c) return 0;
  if (c.type === 'num') {
    const v = parseFloat(row[col]);
    return isNaN(v) ? 0 : ((v - c.min) / c.range - 0.5) * SPREAD;
  }
  return c.map[row[col]] || 0;
}

// ─── Build Visualization ───
function build(hdrs, rows) {
  headers = hdrs;
  csvData = rows;
  mappings = autoMap(hdrs, rows);

  // Pre-compute position caches
  posCache = {};
  [mappings.x, mappings.y, mappings.z].forEach(col => computePosCache(col, rows));

  // Color map
  colorMap = {};
  const colorCol = mappings.color;
  // Count genre frequencies, assign colors to top genres
  const freq = {};
  rows.forEach(r => { const v = r[colorCol] || ''; freq[v] = (freq[v] || 0) + 1; });
  const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);
  sorted.forEach(([val], i) => { colorMap[val] = COLORS[i % COLORS.length]; });

  // Clear scene objects
  meshes.forEach(m => { m.geometry.dispose(); m.material.dispose(); scene.remove(m); });
  labelSprites.forEach(s => scene.remove(s));
  meshes = []; dataPoints = []; labelSprites = [];

  // Create meshes
  const centroid = new THREE.Vector3();

  rows.forEach((row, i) => {
    const x = getPos(row, mappings.x);
    const y = getPos(row, mappings.y);
    const z = getPos(row, mappings.z);

    const colorVal = row[colorCol] || '';
    const color = colorMap[colorVal] || '#999';
    const gIdx = i % GEOMS.length;

    const geom = GEOMS[gIdx]();
    const mat = new THREE.MeshPhysicalMaterial({
      color: new THREE.Color(color),
      metalness: 0.1, roughness: 0.35,
      clearcoat: 0.3, clearcoatRoughness: 0.3,
      emissive: new THREE.Color(color),
      emissiveIntensity: 0.12,
      transparent: true, opacity: 0.85,
    });

    const mesh = new THREE.Mesh(geom, mat);
    const s = 0.8 + Math.random() * 0.6;
    mesh.scale.set(s, s, s);
    mesh.position.set(x, y, z);
    mesh.rotation.set(Math.random()*3, Math.random()*3, Math.random()*3);
    mesh.userData = { row, basePos: new THREE.Vector3(x, y, z) };

    scene.add(mesh);
    meshes.push(mesh);
    dataPoints.push({ mesh, row });
    centroid.add(mesh.position);
  });

  centroid.divideScalar(rows.length || 1);

  // Labels — only top N genres by frequency
  const topGenres = sorted.slice(0, MAX_LABELS);
  const genrePositions = {};
  dataPoints.forEach(dp => {
    const g = dp.row[colorCol] || '';
    if (!genrePositions[g]) genrePositions[g] = { sum: new THREE.Vector3(), count: 0, color: colorMap[g] };
    genrePositions[g].sum.add(dp.mesh.position);
    genrePositions[g].count++;
  });

  topGenres.forEach(([genre]) => {
    const gp = genrePositions[genre];
    if (!gp || !genre) return;
    const avg = gp.sum.clone().divideScalar(gp.count);
    avg.y += 3;
    const sprite = makeLabel(genre, gp.color);
    sprite.position.copy(avg);
    scene.add(sprite);
    labelSprites.push(sprite);
  });

  // Center camera on data
  controls.target.copy(centroid);
  camera.position.set(centroid.x, centroid.y + 30, centroid.z + SPREAD * 1.3);
  controls.update();

  // Update HUD
  const sNote = totalRows > rows.length ? `${rows.length} of ${totalRows.toLocaleString()}` : `${rows.length}`;
  document.getElementById('hud-sub').textContent = `${sNote} tracks`;
  const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
  document.getElementById('info').innerHTML = [
    `X → ${esc(mappings.x)}`,
    `Y → ${esc(mappings.y)}`,
    `Z → ${esc(mappings.z)}`,
    `Color → ${esc(mappings.color)}`,
    `${sorted.length} genres`
  ].join('<br>');
  document.getElementById('nav-hint').innerHTML = [
    'scroll — zoom',
    'drag — orbit',
    'arrow keys — fly',
    'hover — inspect'
  ].join('<br>');
}

function makeLabel(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 96;
  const ctx = canvas.getContext('2d');
  ctx.font = '500 36px Space Mono, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color || '#999';
  ctx.globalAlpha = 0.7;
  ctx.fillText(text.length > 20 ? text.slice(0, 20) + '...' : text, 256, 48);

  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.6, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(16, 3, 1);
  return sprite;
}

// ─── Keyboard fly ───
const keys = {};
function onKey(e) {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].includes(e.key)) {
    e.preventDefault();
    keys[e.key] = true;
  }
}
function onKeyUp(e) { keys[e.key] = false; }

function updateFly() {
  const speed = 1.2;
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0; forward.normalize();
  const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();

  if (keys['ArrowUp'] || keys['w']) { camera.position.addScaledVector(forward, speed); controls.target.addScaledVector(forward, speed); }
  if (keys['ArrowDown'] || keys['s']) { camera.position.addScaledVector(forward, -speed); controls.target.addScaledVector(forward, -speed); }
  if (keys['ArrowLeft'] || keys['a']) { camera.position.addScaledVector(right, -speed); controls.target.addScaledVector(right, -speed); }
  if (keys['ArrowRight'] || keys['d']) { camera.position.addScaledVector(right, speed); controls.target.addScaledVector(right, speed); }
}

// ─── Mouse hover ───
function onMouse(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(meshes);
  const tip = document.getElementById('tooltip');

  if (hoveredMesh) {
    hoveredMesh.material.emissiveIntensity = 0.12;
    if (hoveredMesh.userData.origScale)
      hoveredMesh.scale.copy(hoveredMesh.userData.origScale);
    hoveredMesh = null;
  }

  if (hits.length) {
    const m = hits[0].object;
    hoveredMesh = m;
    if (!m.userData.origScale) m.userData.origScale = m.scale.clone();
    m.material.emissiveIntensity = 0.5;
    m.scale.copy(m.userData.origScale).multiplyScalar(1.5);

    const r = m.userData.row;
    tip.style.display = 'block';
    tip.style.left = Math.min(e.clientX + 14, innerWidth - 310) + 'px';
    tip.style.top = Math.min(e.clientY - 8, innerHeight - 120) + 'px';

    // Find columns dynamically
    const nameCol = headers.find(h => /^name$/i.test(h)) || headers[0];
    const artistCol = headers.find(h => /artist/i.test(h));
    const albumCol = headers.find(h => /album/i.test(h));
    const genreCol = headers.find(h => /genre/i.test(h));
    const yearCol = headers.find(h => /year/i.test(h));

    tip.querySelector('.t-name').textContent = r[nameCol] || '';
    tip.querySelector('.t-artist').textContent = artistCol ? r[artistCol] : '';
    tip.querySelector('.t-album').textContent = albumCol ? r[albumCol] : '';

    const gc = colorMap[r[mappings.color]] || '#999';
    const metaEl = tip.querySelector('.t-meta');
    metaEl.textContent = '';
    if (genreCol && r[genreCol]) {
      const span = document.createElement('span');
      span.className = 't-genre';
      span.style.background = gc + '22';
      span.style.color = gc;
      span.textContent = r[genreCol];
      metaEl.appendChild(span);
      metaEl.appendChild(document.createTextNode(' '));
    }
    if (yearCol && r[yearCol]) {
      metaEl.appendChild(document.createTextNode(r[yearCol]));
    }
  } else {
    tip.style.display = 'none';
  }
}

// ─── Animate ───
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  meshes.forEach((m, i) => {
    m.rotation.x += 0.001 + (i % 5) * 0.0003;
    m.rotation.y += 0.002 + (i % 7) * 0.0002;
    m.position.y = m.userData.basePos.y + Math.sin(t * 0.4 + i * 0.2) * 0.5;
  });

  updateFly();
  controls.update();
  composer.render();
}

// ─── File Loading ───
function handleFile(file) {
  document.getElementById('drop-title').textContent =
    `/// Loading ${(file.size/1048576).toFixed(1)} MB... ///`;

  const reader = new FileReader();
  reader.onerror = () => {
    document.getElementById('drop-title').textContent = '/// Read error ///';
  };
  reader.onload = (e) => {
    const raw = e.target.result;
    document.getElementById('drop-title').textContent = '/// Parsing... ///';
    setTimeout(() => {
      try {
        const { headers: h, rows: r } = parseCSV(raw);
        if (!r.length) {
          document.getElementById('drop-title').textContent =
            `/// 0 rows parsed (${h.length} cols found) ///`;
          return;
        }
        totalRows = r.length;
        const sampled = sampleRows(r);
        document.getElementById('drop-zone').classList.add('hidden');
        build(h, sampled);
      } catch (err) {
        document.getElementById('drop-title').textContent = `/// ${err.message} ///`;
      }
    }, 30);
  };
  reader.readAsText(file);
}

async function loadSample() {
  try {
    const text = await (await fetch('sample_music.csv')).text();
    const { headers: h, rows: r } = parseCSV(text);
    if (!r.length) return;
    totalRows = r.length;
    document.getElementById('drop-zone').classList.add('hidden');
    build(h, r);
  } catch {
    document.getElementById('drop-title').textContent = '/// Could not load sample ///';
  }
}

// ─── Events ───
const dropArea = document.getElementById('drop-area');
const fileInput = document.getElementById('file-input');
dropArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
document.body.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('dragging'); });
document.body.addEventListener('dragleave', () => document.body.classList.remove('dragging'));
document.body.addEventListener('drop', e => {
  e.preventDefault(); document.body.classList.remove('dragging');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
document.getElementById('load-sample').addEventListener('click', loadSample);

// ─── Boot ───
initScene();
animate();
</script>
</body>
</html>
